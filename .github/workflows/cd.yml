# Goal : to deploy the build images from CI steps once the CI steps are successful
name: CD

on:
  workflow_call:
    workflows: ["CI"]
    types:
      - completed
jobs:
  deploy:
    if : github.event.workflow_run.conclusion == 'success'
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name : copy .env file
        run: cp .env.example .env
      - name: Docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name : deploy the containers with docker-compose
        run: |
         docker compose pull
         docker compose up -d
      