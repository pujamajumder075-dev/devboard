# Goal - ensure the docker files and docker images are security tested

name: Docker Scans

on:
  workflow_call:

jobs:
  dockerfile-lint-and-scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        folder:
          - backend
          - frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: ${{ matrix.folder }} Dockerfile lint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.folder }}/Dockerfile

      - name : ${{ matrix.folder }} Docker login
        uses : docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: ${{ matrix.folder }} Docker image Build
        run : docker build -t ${{ secrets.DOCKER_USERNAME }}/devboard-${{ matrix.folder }}:latest .
        working-directory: ${{ matrix.folder }}

      - name: ${{ matrix.folder }} trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/devboard-${{ matrix.folder }}:latest
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
    

