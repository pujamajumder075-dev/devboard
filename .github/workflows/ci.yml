# Goal - I have to Lint, Build and Test my code in CI/CD pipeline
# Push the image to DockerHub

name: CI

on:
  push:
    paths:
      - '**'
      - '!.github/workflows/**'
    branches:
      - master
      - advanced

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps :
      - name: Checkout code
        uses: actions/checkout@v7
      - name: setup node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies (npm packages)
        run: npm install
        working-directory: frontend
      - name: Lint code
        run: npm run lint
        working-directory: frontend
      - name: run tests
        run: npm run test
        working-directory: frontend
      - name : Docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devboard_frontend_ci:latest

  backend:
    runs-on: ubuntu-latest
    steps :
      - name: Checkout code
        uses: actions/checkout@v7
      - name: setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          go-version-file: backend/go.mod
          check-latest: false
          cache-dependency-path: backend/go.sum
      - name: Install Go formatter
        run: go fmt ./...
        working-directory: backend
      - name: Run Go Vet
        run: go vet ./...
        working-directory: backend
      - name: run tests
        run: go test ./...
        working-directory: backend
      - name : Docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devboard_backend_ci:latest

  deploy :
    needs: [frontend, backend]
    uses : ./.github/workflows/cd.yml
    secrets: inherit

