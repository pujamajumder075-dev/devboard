# Goal - I have to Lint, Build and Test my code in CI/CD pipeline
# Push the image to DockerHub

name: CI

on:
  push:
    branches:
      - main
      - advanced

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps :
      - name: Checkout code
        uses: actions/checkout@v7
      - name: setup node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies (npm packages)
        run: npm install
        working-directory: frontend
      - name: Lint code
        run: npm run lint
        working-directory: frontend
      - name: run tests
        run: npm run test
        working-directory: frontend
  #backend:
