# Goal : Build the image for Devboard frontend & Push to Docker hub, after linting the code
name : Continues_Integration
on: 
  workflow_dispatch:
  
jobs:
  Build-and-Push :
    runs-on: ubuntu-latest
    steps :
      - name : Checkout code
        uses : actions/checkout@v4
        
      - name: Docker setup [Login]
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: docker build and push
        uses: docker/build-push-action@v6
        with:
          context : ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devboard-frontend-master:latest
