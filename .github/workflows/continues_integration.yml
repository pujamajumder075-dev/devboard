# Goal : Build the image for Devboard frontend & Push to Docker hub, after linting the code
name : Continues_Integration
on: 
  push:
    branches : [master]
jobs:
  code-lint:
    runs-on: ubuntu-latest
    steps:
      - name : checkout code
        uses : actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v1
        with:
          node-version: 20

      # ESLint and Prettier must be in `package.json`
      - name: Install Node.js dependencies
        working-directory: ./frontend
        run: npm ci
      - name: install linters
        run: npm install eslist --save-dev
      - name: Run linters
        uses: wearerequired/lint-action@v2
        with:
          eslint: true
          prettier: true
        
  Build-and-Push :
    needs: code-lint
    runs-on: ubuntu-latest
    steps :
      - name : Checkout code
        uses : actions/checkout@v4
        
      - name: Docker setup [Login]
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: docker build and push
        uses: docker/build-push-action@v6
        with:
          context : ./frontend
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-frontend-master:latest
